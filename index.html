    .home-titles {
      position: absolute;
      inset: 0 auto 0 calc(5.8865625rem + 72.45px);
      z-index: 30;
      overflow: hidden; /* this is the carousel "window" — it scrolls itself now */
      padding-right: 3rem; /* Expanded the clipping container horizontally to prevent right-side text cutoff */
      padding-left: 48px;
      pointer-events: auto;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 8%, #000 92%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0, #000 8%, #000 92%, transparent 100%);
    }

    .home-titles__track {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 7.5rem;
      padding: 7.5rem 0.5rem 7.5rem 0;
      will-change: transform;
    }
    .home-title {
      display: flex;
      align-items: baseline; /* Align eyebrow with text baseline */
      gap: 1.25rem;
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      padding: 1.5rem 1.5rem 1.5rem 0.275rem; 
      margin-block: -1.445rem;
      margin-right: -1.225rem; 
      text-decoration: none;
      position: relative;
      transform-origin: left center;
      opacity: 0.90;
      transform: translateX(0);
      transition: opacity 300ms cubic-bezier(0.16, 1, 0.3, 1), 
                  transform 300ms cubic-bezier(0.16, 1, 0.3, 1), 
                  color 200ms ease, 
                  filter 300ms cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform, filter;
    }

    .home-title__eyebrow {
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      flex-shrink: 0;
      margin-top: 0.15em; /* Slight adjustment to align with first word visually */
      margin-bottom: 0;
      font-size: var(--fs-xs, 12px);
      font-weight: 700;
      letter-spacing: var(--tracking-caps-wide, 0.12em);
      text-transform: uppercase;
      color: #0f172a;
      white-space: nowrap;
    }

    .home-title__text {
      font-size: clamp(4rem, 8.5vw, 10.9rem);
      line-height: 1.2;
      font-weight: 900;
      color: rgba(15, 23, 42, 0.25);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
      transition: color 180ms ease;
    }

    .home-title[data-reveal] {
      opacity: 0;
      transform: translateX(-28px);
      --reveal-delay: 0ms;
    }
    .home-title[data-reveal].is-revealed {
      opacity: 0.82;
      transform: translateX(0);
      transition: opacity 600ms cubic-bezier(0.16, 1, 0.3, 1) var(--reveal-delay, 0ms),
                  transform 600ms cubic-bezier(0.16, 1, 0.3, 1) var(--reveal-delay, 0ms),
                  color 200ms ease,
                  filter 600ms cubic-bezier(0.16, 1, 0.3, 1) var(--reveal-delay, 0ms);
    }

    .home-title:hover,
    .home-title.is-active {
      transform: translateX(0) scale(1.05);
      opacity: 1;
      text-shadow: none;
    }
    
    .home-title:hover .home-title__text,
    .home-title.is-active .home-title__text {
      color: #0f172a;
    }

    .home-titles:hover .home-title:not(:hover) {
      opacity: 0.3 !important;
      transform: translateX(0) scale(0.95);
      filter: blur(2px);
    }

    /* .is-revealed has higher specificity than a plain :hover rule, so without this,
       hovering a title that already played its reveal animation got stuck at 0.82
       opacity instead of reaching 1. This is the actual bug behind issue #2. */
    .home-title[data-reveal].is-revealed:hover,
    .home-title[data-reveal].is-revealed.is-active {
      opacity: 1;
      transform: translateX(0) scale(1.05);
    }

    .home-title:focus {

    .hamburger {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 260;
      width: 56px;
      height: 56px;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      background: rgba(6, 12, 22, 1);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.24);
      cursor: pointer;
      transition: transform 220ms var(--ease-out), background 180ms ease, box-shadow 180ms ease;
      color: #fff;
      --hamburger-bottom: 18px;
      --hamburger-size: 56px;
    }
    .hamburger:hover,
    .hamburger:focus-visible { transform: translateY(-2px) scale(1.03); background: rgba(10, 10, 10, 0.94); box-shadow: 0 28px 72px rgba(0,0,0,0.28); }
    .hamburger-inner {
      position: relative;
      width: 22px;
      height: 2px;
      background: currentColor;
      display: block;
      transition: background 220ms ease;
    }
    .hamburger-inner::before,
    .hamburger-inner::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background: currentColor;
      transition: transform 280ms ease, opacity 220ms ease;
    }
    .hamburger-inner::before { top: -7px; }
    .hamburger-inner::after { top: 7px; }
    .hamburger.open .hamburger-inner { background: transparent; }
    .hamburger.open .hamburger-inner::before { transform: translateY(7px) rotate(45deg); }
    .hamburger.open .hamburger-inner::after { transform: translateY(-7px) rotate(-45deg); }

    .hamburger:focus-visible {
      outline: none;
      box-shadow: 0 6px 18px rgba(2,6,23,0.28), 0 0 0 6px rgba(59,130,246,0.12);
      transform: translateY(-2px) scale(1.03);
    }

    .hamburger-menu {
      position: fixed;
      left: 18px;
      /* position menu so its bottom edge is (button bottom + button size + 8px gap) from viewport bottom */
      bottom: calc(var(--hamburger-bottom, 18px) + var(--hamburger-size, 56px) + 8px);
      z-index: 200;
      width: min(320px, 80vw);
      padding: 16px;
      background: rgba(6, 12, 22, 0.82);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.24);
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px) scale(0.98);
      transition: opacity 180ms cubic-bezier(.2,.9,.2,1), transform 180ms cubic-bezier(.2,.9,.2,1);
      will-change: opacity, transform;
    }
    .hamburger-menu.show { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    .hamburger-menu a {
      color: #f8fafc;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateX(-12px) translateY(0);
      transition: opacity 180ms cubic-bezier(.2,.9,.2,1), transform 180ms cubic-bezier(.2,.9,.2,1), color 100ms ease, background 100ms ease;
      will-change: opacity, transform;
    }
    .hamburger-menu.show a { opacity: 1; transform: translateX(0); }
    .hamburger-menu a:focus { outline: none; box-shadow: 0 6px 18px rgba(2,6,23,0.28); }
    .hamburger-menu a:hover { background: transparent !important; color: var(--accent); transform: translateX(2px); }
    .hamburger-menu a[aria-current="page"],

  <!-- NLI Connection Logic -->
  <script>
    (function() {
      const miniInput = document.getElementById('ai-mini-input');
      if (miniInput) miniInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          const query = miniInput.value.trim();
          if (!query) return;
          miniInput.value = '';
          const trigger = document.querySelector('[data-assistant-trigger]');
          if (trigger) trigger.click();
          setTimeout(() => {
            document.dispatchEvent(new CustomEvent("rs:ask-section", {
              detail: {
                prompt: query,
                sectionContext: { heading: "Homepage NLI" }
              }
            }));
          }, 300);
        }
      });
    })();
  </script>

  <script>
    // Ensure the homepage puts the AI input first and avoids duplicate cards.
    (function(){
      document.addEventListener('DOMContentLoaded', function(){
        try {
          // Hamburger menu entrance stagger
          const hamburger = document.getElementById('hamburger');
          const menu = document.getElementById('hamburgerMenu');
          if (hamburger && menu) {
            menu.querySelectorAll('a').forEach((link, index) => {
              link.style.transitionDelay = `${index * 20}ms`;
            });
          }
        } catch (e) {
          console.error('Homepage DOM safety script error', e);
        }
      });
    })();
  </script>
