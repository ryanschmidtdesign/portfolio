[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
  
[[headers]]  
  for = "/portfolio-kb.json"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/portfolio-chat"
  status = 200

[[redirects]]
  from = "/api/track-resume"
  to = "/.netlify/functions/track-resume"
  status = 200

# Clean URLs → pages/ (production canonical paths, local dev via netlify dev)
[[redirects]]
  from = "/about.html"
  to = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/dashboard.html"
  to = "/pages/dashboard.html"
  status = 200

[[redirects]]
  from = "/inventory.html"
  to = "/pages/inventory.html"
  status = 200

[[redirects]]
  from = "/ai-coding-portfolio.html"
  to = "/pages/ai-coding-portfolio.html"
  status = 200

[[redirects]]
  from = "/design-system.html"
  to = "/ai-coding-portfolio.html"
  status = 301

[[redirects]]
  from = "/member-portal-overhaul.html"
  to = "/pages/member-portal-overhaul.html"
  status = 200

[[redirects]]
  from = "/portfolio-kb.json"
  to = "/assets/portfolio-kb.json"
  status = 200

[[redirects]]
  from = "/llms.txt"
  to = "/assets/llms.txt"
  status = 200


[functions]
  node_bundler = "esbuild"